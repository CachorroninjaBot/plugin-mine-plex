name: HaizServerCore
version: ${version}
main: com.haiz.servercore.HaizServerCore
api-version: "1.20.6"
author: Haiz
description: Core do servidor Haiz com integração Discord, VIP Shop, Teams e mais.
folia-supported: false
softdepend: [Vault, LuckPerms, BetterTeams, IridiumMobCoins, ProtocolLib]

commands:
  haizcore:
    description: Comando administrativo do HaizServerCore.
    usage: /haizcore
    aliases: [hcore, hsc]
    permission: haizcore.admin
  linkar:
    description: Vincula sua conta Minecraft ao Discord.
    usage: /linkar <código>
    permission: haiz.vip.link
  vipconfig:
    description: Gerencia as configurações do seu VIP.
    usage: /vipconfig
    permission: haiz.vip.config
  repair:
    description: Repara itens no inventário.
    usage: /repair [hand|all]
    aliases: [reparar]
    permission: haizcore.repair
  time:
    description: Abre o painel de gerenciamento do time.
    usage: /time [web <código>]
    permission: haiz.teams.use

permissions:
  haizcore.admin:
    description: Acesso total ao HaizServerCore.
    default: op
  haizcore.vip.send:
    description: Permite enviar a mensagem de loja de VIPs no Discord.
    default: op
  haizcore.chat.receive:
    description: Permite receber mensagens do Discord no chat.
    default: true
  haizcore.chat.send:
    description: Permite enviar mensagens do chat para o Discord.
    default: true
  haizcore.events.receive:
    description: Permite receber notificações de eventos.
    default: true
  haiz.vip.link:
    description: Permite usar /linkar para vincular conta ao Discord.
    default: true
  haiz.vip.config:
    description: Permite usar /vipconfig para gerenciar configurações do VIP.
    default: true
  haizcore.repair:
    description: Permite usar /repair para reparar itens.
    default: true
  haizcore.repair.bypass:
    description: Bypass de custo e cooldown no repair.
    default: op
  haiz.teams.use:
    description: Permite usar /time para gerenciar o time.
    default: true
  haizcore.console:
    description: Permite executar comandos via console do Discord.
    default: op
