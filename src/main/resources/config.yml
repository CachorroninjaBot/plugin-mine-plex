# ============================================
#  HaizServerCore
# ============================================
# A configuração detalhada de cada módulo fica em
# arquivos separados dentro da pasta config/.
#
# Arquivos de configuração:
#   config/discord.yml       - Bot Discord
#   config/chat.yml          - Chat Bridge
#   config/linking.yml       - Vinculação de contas
#   config/events.yml        - Eventos do servidor
#   config/sync.yml          - Sincronização MC <-> Discord
#   config/console.yml       - Console no Discord
#   config/responses.yml     - Respostas automáticas
#   config/status.yml        - Status do servidor
#   config/command-logs.yml  - Log de comandos
#   config/vip.yml           - VIP Shop
#   config/repair.yml        - Auto Repair
#   config/teams.yml         - Sistema de times
#   config/storage.yml       - Banco de dados
#
# Para recarregar todas as configs: /haizcore reload
# ============================================
