discord:
  enabled: true
  token: "COLOQUE_O_TOKEN_AQUI"
  guild-id: ""
  activity:
    enabled: true
    text: "Monitorando o servidor"
  status-webhook: "https://discord.com/api/webhooks/1516662226210263060/DBq0Ca9LX85-Li-RwEcSfM26P1xEtlhf3G-ubJdQnvdok0W85uOsytS6zJmaQ1Gbmlvw"

vip:
  discord:
    shop-channel-id: "ID_DO_CANAL_DE_VIPS"
    logs-channel-id: "ID_DO_CANAL_DE_LOGS"
    shop-image-url: "https://cdn.discordapp.com/attachments/1490081242937557177/1516646686209081424/d3678e7c-7dcd-4af5-af35-fdc15eb0c811.png"
    shop-thumbnail-url: "https://cdn.discordapp.com/icons/1375700384353484820/a66b5a142f5a32fdb1502785ca875a67.png?size=4096"

  link:
    code-expiry-seconds: 120

  purchase:
    confirm-timeout-seconds: 60

  tiers:
    Vip:
      display-name: "VIP"
      price: 5000
      emoji-id: "1516290472979595436"
      emoji-name: "vip"
      description: "O plano inicial para apoiadores do servidor."
      perks:
        - "Prefixo [VIP] colorido"
        - "Kit VIP semanal"
        - "Acesso a comandos exclusivos"
      grant-command: "lp user %player% parent add vip"

    Elite:
      display-name: "Elite"
      price: 10000
      emoji-id: "1516290514847269014"
      emoji-name: "elite"
      description: "Um nível acima, com mais vantagens."
      perks:
        - "Tudo do VIP"
        - "Kit Elite semanal"
        - "Voo em mundos de sobrevivência"
      grant-command: "lp user %player% parent add elite"

    Ultra:
      display-name: "Ultra"
      price: 20000
      emoji-id: "1516290555653390448"
      emoji-name: "ultra"
      description: "Para os jogadores mais dedicados."
      perks:
        - "Tudo do Elite"
        - "Kit Ultra diário"
        - "Acesso a regiões exclusivas"
      grant-command: "lp user %player% parent add ultra"

    Midia:
      display-name: "Mídia"
      price: 15000
      emoji-id: "1516639500317626469"
      emoji-name: "midia"
      description: "Para criadores de conteúdo parceiros."
      perks:
        - "Tag [Mídia] no chat"
        - "Kit exclusivo de Mídia"
      grant-command: "lp user %player% parent add midia"

    Famoso:
      display-name: "Famoso"
      price: 30000
      emoji-id: "1516639945358577756"
      emoji-name: "famoso"
      description: "O plano premium máximo do servidor."
      perks:
        - "Tudo do Ultra"
        - "Tag [Famoso] dourada"
        - "Kit Famoso diário premium"
        - "Acesso antecipado a novidades"
      grant-command: "lp user %player% parent add famoso"

storage:
  type: "sqlite"
  sqlite:
    file: "haizservercore.db"

auto-repair:
  enabled: true
  tiers:
    - "Vip"
    - "Elite"
    - "Ultra"
    - "Famoso"
    - "Midia"
  durability-threshold: 5
  cooldown-seconds: 10
  play-sound: true
  send-message: true
  message: "§8[§bHaizCore§8] §a§l%item% §areparado automaticamente!"
  blacklisted-materials:
    - "ELYTRA"
    - "SHIELD"
  custom-thresholds:
    DIAMOND_PICKAXE: 3
    DIAMOND_AXE: 3
    DIAMOND_SWORD: 3
    NETHERITE_PICKAXE: 3
    NETHERITE_AXE: 3
    NETHERITE_SWORD: 3

updater:
  github-owner: "HaizMC"
  github-repo: "HaizServerCore"
  check-interval-minutes: 30
