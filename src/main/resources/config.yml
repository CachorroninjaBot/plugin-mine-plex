    DIAMOND_AXE: 3
    DIAMOND_SWORD: 3
    NETHERITE_PICKAXE: 3
    NETHERITE_AXE: 3
    NETHERITE_SWORD: 3

updater:
  github-owner: "HaizMC"
  github-repo: "HaizServerCore"
  check-interval-minutes: 30

teams:
  enabled: true
  web:
    enabled: true
    port: 8080
    host: "0.0.0.0"
    auth-code-expiry: 300
  discord:
    panel-channel-id: ""
  gui:
    title: "§8§lGerenciar Time"
