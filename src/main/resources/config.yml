discord:
  enabled: true
  token: "COLOQUE_O_TOKEN_AQUI"
  guild-id: ""
  channels:
    server-logs: ""
    command-logs: ""
    join-leave-logs: ""
    console-logs: ""
    metrics-reports: ""
    alerts: ""
  activity:
    enabled: true
    text: "Monitorando o servidor"
  reconnect:
    enabled: true
    max-attempts: 5
  queue:
    send-delay-millis: 750
    max-buffer-size: 250

vip:
  discord:
    shop-channel-id: "ID_DO_CANAL_DE_VIPS"
    logs-channel-id: "ID_DO_CANAL_DE_LOGS"
    shop-image-url: "https://cdn.discordapp.com/attachments/1490081242937557177/1516646686209081424/d3678e7c-7dcd-4af5-af35-fdc15eb0c811.png"
    shop-thumbnail-url: "https://cdn.discordapp.com/icons/1375700384353484820/a66b5a142f5a32fdb1502785ca875a67.png?size=4096"

  link:
    code-expiry-seconds: 120

  purchase:
    confirm-timeout-seconds: 60

  tiers:
    Vip:
      display-name: "VIP"
      price: 5000
      emoji-id: "1516290472979595436"
      emoji-name: "vip"
      description: "O plano inicial para apoiadores do servidor."
      perks:
        - "Prefixo [VIP] colorido"
        - "Kit VIP semanal"
        - "Acesso a comandos exclusivos"
      grant-command: "lp user %player% parent set vip"

    Elite:
      display-name: "Elite"
      price: 10000
      emoji-id: "1516290514847269014"
      emoji-name: "elite"
      description: "Um nível acima, com mais vantagens."
      perks:
        - "Tudo do VIP"
        - "Kit Elite semanal"
        - "Voo em mundos de sobrevivência"
      grant-command: "lp user %player% parent set elite"

    Ultra:
      display-name: "Ultra"
      price: 20000
      emoji-id: "1516290555653390448"
      emoji-name: "ultra"
      description: "Para os jogadores mais dedicados."
      perks:
        - "Tudo do Elite"
        - "Kit Ultra diário"
        - "Acesso a regiões exclusivas"
      grant-command: "lp user %player% parent set ultra"

    Midia:
      display-name: "Mídia"
      price: 15000
      emoji-id: "1516639500317626469"
      emoji-name: "midia"
      description: "Para criadores de conteúdo parceiros."
      perks:
        - "Tag [Mídia] no chat"
        - "Kit exclusivo de Mídia"
      grant-command: "lp user %player% parent set midia"

    Famoso:
      display-name: "Famoso"
      price: 30000
      emoji-id: "1516639945358577756"
      emoji-name: "famoso"
      description: "O plano premium máximo do servidor."
      perks:
        - "Tudo do Ultra"
        - "Tag [Famoso] dourada"
        - "Kit Famoso diário premium"
        - "Acesso antecipado a novidades"
      grant-command: "lp user %player% parent set famoso"

storage:
  type: "sqlite"
  sqlite:
    file: "haizservercore.db"
  mysql:
    enabled: false
    host: "localhost"
    port: 3306
    database: "haizservercore"
    username: "root"
    password: ""

logs:
  join-leave:
    enabled: true
    returning-after-days: 14
  commands:
    enabled: true
    hide-sensitive-arguments: true
    sensitive-commands:
      - login
      - register
      - changepassword
      - senha
      - auth
    dangerous-console-commands:
      - stop
      - restart
      - op
      - deop
      - whitelist
  console:
    commands-enabled: true
    output-capture-enabled: false
  chat:
    enabled: true
  deaths:
    enabled: true
  advancements:
    enabled: true
  world-change:
    enabled: true
  kick:
    enabled: true
  blocks:
    enabled: true
  movement:
    enabled: true

metrics:
  enabled: true
  snapshot-interval-seconds: 60
  save-interval-seconds: 300
  afk-detection:
    enabled: true
    minutes-without-move: 10
  reports:
    daily:
      enabled: true
      time: "23:59"
    weekly:
      enabled: true
      day: "SUNDAY"
      time: "23:59"

alerts:
  enabled: true
  low-tps:
    enabled: true
    threshold: 17.0
    cooldown-seconds: 300
  mass-join:
    enabled: true
    amount: 8
    within-seconds: 60
  mass-leave:
    enabled: true
    amount: 8
    within-seconds: 60
  command-spam:
    enabled: true
    amount: 10
    within-seconds: 30
  new-record-online:
    enabled: true

activity:
  enabled: true

  storage:
    type: "sqlite"
    file: "activity.db"
    autosave-minutes: 5

  tracking:
    join-quit: true
    playtime: true
    commands: true
    deaths: true
    kills: true
    blocks-broken: true
    blocks-placed: true
    mobs-killed: true
    advancements: true
    distance-walked: true
    online-snapshots: true
    snapshot-minutes: 5

  discord:
    enabled: false
    webhook-url: "COLOQUE_AQUI"
    daily-report:
      enabled: true
      time: "23:59"
    weekly-report:
      enabled: true
      day: "SUNDAY"
      time: "23:59"
    alerts:
      enabled: true
      low-activity: true
      inactive-hours-threshold: 3
      daily-peak: true
      new-player: false

  rankings:
    daily-limit: 10
    weekly-limit: 10

  privacy:
    ignore-vanished-players: true
    ignore-op-commands: false
    hide-command-arguments: true
