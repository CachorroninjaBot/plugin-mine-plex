# ==========================================
#  Website / Store Integration
# ==========================================
# O site (site-minepex) e o plugin conversam através da
# minepex-api (Node/Express no Render). O plugin NÃO roda
# mais uma API HTTP embutida — apenas faz polling da API
# externa para entregar compras e sincronizar saldos.
#
# Fonte ÚNICA da verdade do catálogo de itens:
#   minepex-api/store-items.json
# O StorePoller busca /api/store/items no startup e a cada
# ciclo, populando o cache interno. Não edite preços aqui.
#
# Para recarregar: /haizcore reload

# URL da minepex-api (Render) usada para polling de compras.
# Deixe vazio para desabilitar o polling (sem entrega automática).
store-api-url: "https://minepex-api.onrender.com"

# Segredo compartilhado com a minepex-api.
# Deve ser IGUAL à variável PLUGIN_SECRET no Render.
plugin-secret: "minepex-plugin-secret"

# ── Link API (opcional) ───────────────────────────────────────
# O plugin expõe, nesta porta, um endpoint mínimo que a minepex-api
# consulta durante o login com Discord, para descobrir o Minecraft
# vinculado a um discord_id (discord_links).
#
# Requer que a minepex-api (Render) consiga alcançar host:port
# (VPS com IP público + firewall liberando a porta).
# Porta 0 = desabilitado (login Discord ainda funciona, só não
# traz o MC automaticamente).
link-api-host: "0.0.0.0"
link-api-port: 0
